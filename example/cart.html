<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — Naeem Electronics</title>
  <meta name="description" content="Review your cart and checkout. Pay in full or apply for installment financing.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    .cart-page { padding-top: 100px; min-height: 80vh; }
    .cart-layout { display: grid; grid-template-columns: 1fr 380px; gap: 32px; align-items: start; }
    .cart-items { display: flex; flex-direction: column; gap: 16px; }
    .cart-item { display: grid; grid-template-columns: 100px 1fr auto; gap: 20px; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: var(--transition); }
    .cart-item:hover { border-color: var(--accent); }
    .cart-item-img { width: 100px; height: 100px; border-radius: var(--radius-sm); overflow: hidden; background: var(--bg-secondary); }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .cart-item-info .brand { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .cart-item-info .price { font-size: 1.1rem; font-weight: 800; }
    .cart-item-info .emi-note { font-size: 0.75rem; color: var(--accent); margin-top: 4px; }
    .qty-control { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .qty-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: var(--transition); }
    .qty-btn:hover { border-color: var(--accent); background: rgba(99,102,241,0.1); }
    .qty-val { font-weight: 700; min-width: 30px; text-align: center; }
    .cart-item-remove { background: none; color: var(--text-dim); font-size: 1.2rem; padding: 8px; transition: var(--transition); }
    .cart-item-remove:hover { color: var(--danger); }
    .cart-summary { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; position: sticky; top: 100px; }
    .cart-summary h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 24px; }
    .summary-row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 0.9rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-total { display: flex; justify-content: space-between; padding: 16px 0; font-size: 1.2rem; font-weight: 800; border-top: 2px solid var(--accent); margin-top: 8px; }
    .checkout-options { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .checkout-options .btn { width: 100%; justify-content: center; }
    .payment-choice { display: flex; gap: 8px; margin-top: 16px; }
    .payment-opt { flex: 1; padding: 16px; background: var(--bg-secondary); border: 2px solid var(--border); border-radius: var(--radius-sm); text-align: center; cursor: pointer; transition: var(--transition); }
    .payment-opt.selected { border-color: var(--accent); background: rgba(99,102,241,0.08); }
    .payment-opt h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; }
    .payment-opt p { font-size: 0.7rem; color: var(--text-muted); }
    .empty-cart { text-align: center; padding: 80px 20px; }
    .empty-cart h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
    .empty-cart p { color: var(--text-muted); margin-bottom: 24px; }
    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-item { grid-template-columns: 80px 1fr; }
      .cart-item-remove { position: absolute; top: 12px; right: 12px; }
      .cart-item { position: relative; }
      .cart-summary { position: static; }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">Naeem<span>Electronics</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="installment-guide.html">Installment Guide</a></li>
        <li><a href="cart.html" class="active">Cart</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="nav-action-btn" aria-label="Cart">🛒<span class="nav-badge" id="cartCount">0</span></a>
        <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">☰</button>
      </div>
    </div>
  </nav>

  <section class="section cart-page">
    <div class="container">
      <h1 style="font-size: 2rem; font-weight: 900; margin-bottom: 32px;">Shopping Cart</h1>
      <div id="cartContent"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><div class="footer-bottom"><p>&copy; 2026 Naeem Electronics. All rights reserved.</p><p>Designed with ⚡</p></div></div>
  </footer>

  <script src="js/data.js"></script>
  <script>
    let paymentMode = "full";

    document.addEventListener("DOMContentLoaded", () => {
      const navbar = document.getElementById("navbar");
      const toggle = document.getElementById("mobileToggle");
      const links = document.getElementById("navLinks");
      window.addEventListener("scroll", () => navbar.classList.toggle("scrolled", window.scrollY > 50));
      toggle?.addEventListener("click", () => { links.classList.toggle("open"); toggle.textContent = links.classList.contains("open") ? "✕" : "☰"; });
      renderCart();
    });

    function getCart() { return JSON.parse(localStorage.getItem("ne_cart") || "[]"); }
    function saveCart(cart) { localStorage.setItem("ne_cart", JSON.stringify(cart)); updateCartCount(); renderCart(); }
    function updateCartCount() {
      const b = document.getElementById("cartCount");
      const c = getCart().reduce((s, i) => s + i.qty, 0);
      b.textContent = c; b.style.display = c > 0 ? "flex" : "none";
    }

    function renderCart() {
      const cart = getCart();
      const container = document.getElementById("cartContent");
      updateCartCount();

      if (!cart.length) {
        container.innerHTML = `<div class="empty-cart"><div style="font-size:4rem;margin-bottom:16px;">🛒</div><h2>Your cart is empty</h2><p>Looks like you haven't added anything yet.</p><a href="shop.html" class="btn btn-primary">Start Shopping →</a></div>`;
        return;
      }

      let subtotal = 0;
      const itemsHTML = cart.map(item => {
        const p = getProductById(item.id);
        if (!p) return "";
        const total = p.price * item.qty;
        subtotal += total;
        const emi = calculateEMI(p.price, p.downPayment || 0, 12);
        return `
          <div class="cart-item">
            <div class="cart-item-img"><img src="${p.image}" alt="${p.name}"></div>
            <div class="cart-item-info">
              <div class="brand">${p.brand}</div>
              <h3>${p.name}</h3>
              <div class="price">${formatPrice(p.price)}</div>
              ${p.installment ? `<div class="emi-note">EMI from ${formatPrice(emi)}/mo</div>` : ""}
              <div class="qty-control">
                <button class="qty-btn" onclick="updateQty(${p.id}, -1)">−</button>
                <span class="qty-val">${item.qty}</span>
                <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
              </div>
            </div>
            <button class="cart-item-remove" onclick="removeItem(${p.id})" aria-label="Remove">🗑</button>
          </div>
        `;
      }).join("");

      const totalDown = cart.reduce((s, item) => { const p = getProductById(item.id); return s + (p?.downPayment || 0) * item.qty; }, 0);
      const monthlyTotal = cart.reduce((s, item) => { const p = getProductById(item.id); return s + calculateEMI(p.price, p?.downPayment || 0, 12) * item.qty; }, 0);

      container.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items">${itemsHTML}</div>
          <div class="cart-summary">
            <h2>Order Summary</h2>
            <div class="summary-row"><span>Subtotal</span><span>${formatPrice(subtotal)}</span></div>
            <div class="summary-row"><span>Delivery</span><span style="color:var(--success);">FREE</span></div>
            <div class="summary-total"><span>Total</span><span>${formatPrice(subtotal)}</span></div>
            <div style="margin-top:16px;font-size:0.8rem;color:var(--text-muted);font-weight:600;">Payment Method</div>
            <div class="payment-choice">
              <div class="payment-opt ${paymentMode === 'full' ? 'selected' : ''}" onclick="selectPayment('full')"><h4>💳 Pay Full</h4><p>${formatPrice(subtotal)}</p></div>
              <div class="payment-opt ${paymentMode === 'emi' ? 'selected' : ''}" onclick="selectPayment('emi')"><h4>📋 Installment</h4><p>${formatPrice(monthlyTotal)}/mo</p></div>
            </div>
            <div id="emiSummary" style="display:${paymentMode === 'emi' ? 'block' : 'none'};margin-top:12px;padding:12px;background:rgba(99,102,241,0.08);border-radius:var(--radius-sm);font-size:0.8rem;">
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:var(--text-muted);">Down Payment</span><span style="font-weight:700;">${formatPrice(totalDown)}</span></div>
              <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Monthly × 12</span><span style="font-weight:700;color:var(--accent);">${formatPrice(monthlyTotal)}</span></div>
            </div>
            <div class="checkout-options">
              <button class="btn btn-primary" onclick="alert('Checkout process initiated! In a real app, this would proceed to payment.')">Proceed to Checkout →</button>
              <a href="shop.html" class="btn btn-outline" style="text-align:center;">Continue Shopping</a>
            </div>
          </div>
        </div>
      `;
    }

    function updateQty(id, delta) {
      const cart = getCart();
      const item = cart.find(i => i.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) cart.splice(cart.indexOf(item), 1);
      saveCart(cart);
    }
    function removeItem(id) {
      const cart = getCart().filter(i => i.id !== id);
      saveCart(cart);
    }
    function selectPayment(mode) {
      paymentMode = mode;
      renderCart();
    }
  </script>
</body>
</html>
