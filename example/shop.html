<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop All Products — Naeem Electronics</title>
  <meta name="description" content="Browse our complete collection of smartphones, laptops, tablets & accessories. Filter by brand, price, and installment availability.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    .shop-layout { display: grid; grid-template-columns: 280px 1fr; gap: 32px; padding-top: 100px; }
    .sidebar { position: sticky; top: 100px; height: fit-content; }
    .filter-group { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .filter-group h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .filter-group h3 span { font-size: 0.75rem; color: var(--accent); cursor: pointer; font-weight: 500; }
    .filter-option { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); transition: var(--transition); }
    .filter-option:hover { color: var(--text); }
    .filter-option input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }
    .filter-option .count { margin-left: auto; font-size: 0.75rem; color: var(--text-dim); }
    .price-inputs { display: flex; gap: 10px; align-items: center; }
    .price-input { width: 100%; padding: 10px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 0.85rem; outline: none; }
    .price-input:focus { border-color: var(--accent); }
    .shop-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    .shop-header h1 { font-size: 1.5rem; font-weight: 800; }
    .shop-sort select { padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 0.85rem; outline: none; cursor: pointer; }
    .result-count { font-size: 0.85rem; color: var(--text-muted); }
    .active-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .active-filter-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); border-radius: 100px; font-size: 0.75rem; color: var(--accent); cursor: pointer; }
    .active-filter-tag:hover { background: rgba(99,102,241,0.2); }
    .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .no-results h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
    .mobile-filter-btn { display: none; }
    @media (max-width: 768px) {
      .shop-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; position: fixed; inset: 0; z-index: 1500; background: var(--bg-primary); overflow-y: auto; padding: 20px; }
      .sidebar.open { display: block; }
      .mobile-filter-btn { display: inline-flex; }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">Naeem<span>Electronics</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li class="mega-menu-trigger"><a href="shop.html" class="active">Categories ▾</a><div class="mega-menu" id="megaMenu"></div></li>
        <li><a href="shop.html" class="active">Shop</a></li>
        <li><a href="installment-guide.html">Installment Guide</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
      <div class="nav-actions">
        <button class="nav-action-btn" aria-label="Search">🔍</button>
        <a href="cart.html" class="nav-action-btn" aria-label="Cart">🛒<span class="nav-badge" id="cartCount">0</span></a>
        <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">☰</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="shop-layout">
      <!-- SIDEBAR FILTERS -->
      <aside class="sidebar" id="sidebar">
        <div class="filter-group">
          <h3>Category <span onclick="clearFilter('cat')">Clear</span></h3>
          <div id="filterCategories"></div>
        </div>
        <div class="filter-group">
          <h3>Brand <span onclick="clearFilter('brand')">Clear</span></h3>
          <div id="filterBrands"></div>
        </div>
        <div class="filter-group">
          <h3>Price Range</h3>
          <div class="price-inputs">
            <input type="number" class="price-input" id="priceMin" placeholder="Min">
            <span style="color:var(--text-dim);">—</span>
            <input type="number" class="price-input" id="priceMax" placeholder="Max">
          </div>
          <button class="btn btn-primary" style="width:100%;margin-top:12px;padding:10px;font-size:0.8rem;" onclick="applyFilters()">Apply</button>
        </div>
        <div class="filter-group">
          <h3>Availability</h3>
          <label class="filter-option">
            <input type="checkbox" id="filterInstallment"> Available on Installment
          </label>
        </div>
        <button class="btn btn-outline" style="width:100%;justify-content:center;display:none;" id="closeSidebar" onclick="document.getElementById('sidebar').classList.remove('open')">Close Filters</button>
      </aside>

      <!-- PRODUCTS -->
      <main>
        <div class="shop-header">
          <div>
            <h1>All Products</h1>
            <div class="result-count" id="resultCount"></div>
          </div>
          <div style="display:flex;gap:12px;align-items:center;">
            <button class="btn btn-outline mobile-filter-btn" onclick="document.getElementById('sidebar').classList.add('open')">☰ Filters</button>
            <div class="shop-sort">
              <select id="sortSelect" onchange="applyFilters()">
                <option value="featured">Featured</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="rating">Highest Rated</option>
                <option value="name">Name A-Z</option>
              </select>
            </div>
          </div>
        </div>
        <div class="active-filters" id="activeFilters"></div>
        <div class="products-grid" id="shopGrid"></div>
        <div class="no-results" id="noResults" style="display:none;">
          <h3>No products found</h3>
          <p>Try adjusting your filters or search terms.</p>
        </div>
      </main>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Naeem Electronics. All rights reserved.</p>
        <p>Designed with ⚡</p>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script>
    // ===== INIT =====
    document.addEventListener("DOMContentLoaded", () => {
      initNavbar(); renderMegaMenu(); renderFilters(); applyFilters(); updateCartCount();
      // URL params
      const params = new URLSearchParams(window.location.search);
      const cat = params.get("cat");
      if (cat) {
        const cb = document.querySelector(`#filterCategories input[value="${cat}"]`);
        if (cb) { cb.checked = true; applyFilters(); }
      }
    });

    function initNavbar() {
      const navbar = document.getElementById("navbar");
      const toggle = document.getElementById("mobileToggle");
      const links = document.getElementById("navLinks");
      window.addEventListener("scroll", () => navbar.classList.toggle("scrolled", window.scrollY > 50));
      toggle?.addEventListener("click", () => { links.classList.toggle("open"); toggle.textContent = links.classList.contains("open") ? "✕" : "☰"; });
    }
    function renderMegaMenu() {
      const menu = document.getElementById("megaMenu");
      if (!menu) return;
      menu.innerHTML = CATEGORIES.map(c => `<a href="shop.html?cat=${c.id}"><span class="cat-icon">${c.icon}</span><div><div class="cat-name">${c.name}</div><div class="cat-count">${c.count} Products</div></div></a>`).join("");
    }

    // ===== FILTERS =====
    function renderFilters() {
      const catContainer = document.getElementById("filterCategories");
      catContainer.innerHTML = CATEGORIES.map(c => `<label class="filter-option"><input type="checkbox" value="${c.id}" onchange="applyFilters()"> ${c.name} <span class="count">${c.count}</span></label>`).join("");
      const brandContainer = document.getElementById("filterBrands");
      brandContainer.innerHTML = BRANDS.map(b => `<label class="filter-option"><input type="checkbox" value="${b}" onchange="applyFilters()"> ${b}</label>`).join("");
      document.getElementById("filterInstallment").addEventListener("change", applyFilters);
    }

    function applyFilters() {
      let results = [...PRODUCTS];
      // Category
      const cats = [...document.querySelectorAll("#filterCategories input:checked")].map(c => c.value);
      if (cats.length) results = results.filter(p => cats.includes(p.category));
      // Brand
      const brands = [...document.querySelectorAll("#filterBrands input:checked")].map(b => b.value);
      if (brands.length) results = results.filter(p => brands.includes(p.brand));
      // Price
      const min = parseInt(document.getElementById("priceMin").value) || 0;
      const max = parseInt(document.getElementById("priceMax").value) || Infinity;
      results = results.filter(p => p.price >= min && p.price <= max);
      // Installment
      if (document.getElementById("filterInstallment").checked) results = results.filter(p => p.installment);
      // Sort
      const sort = document.getElementById("sortSelect").value;
      if (sort === "price-low") results.sort((a, b) => a.price - b.price);
      else if (sort === "price-high") results.sort((a, b) => b.price - a.price);
      else if (sort === "rating") results.sort((a, b) => b.rating - a.rating);
      else if (sort === "name") results.sort((a, b) => a.name.localeCompare(b.name));

      document.getElementById("resultCount").textContent = `Showing ${results.length} of ${PRODUCTS.length} products`;
      document.getElementById("shopGrid").innerHTML = results.map(p => productCardHTML(p)).join("");
      document.getElementById("noResults").style.display = results.length ? "none" : "block";
      document.getElementById("shopGrid").style.display = results.length ? "grid" : "none";
    }

    function clearFilter(type) {
      if (type === "cat") document.querySelectorAll("#filterCategories input").forEach(c => c.checked = false);
      if (type === "brand") document.querySelectorAll("#filterBrands input").forEach(c => c.checked = false);
      applyFilters();
    }

    function productCardHTML(p) {
      const discount = getDiscountPercent(p.oldPrice, p.price);
      const emi = calculateEMI(p.price, p.downPayment || 0, 12);
      const stars = "★".repeat(Math.floor(p.rating));
      return `<div class="product-card"><div class="card-image"><img src="${p.image}" alt="${p.name}" loading="lazy"><div class="card-badges">${p.badge ? `<span class="badge badge-accent">${p.badge}</span>` : ""}${discount > 0 ? `<span class="badge badge-success">-${discount}%</span>` : ""}</div></div><div class="card-body"><div class="card-brand">${p.brand}</div><div class="card-title">${p.name}</div><div class="card-rating"><span class="stars">${stars}</span><span class="rating-num">${p.rating}</span><span class="rating-count">(${p.reviews})</span></div><div class="card-pricing"><span class="card-price">${formatPrice(p.price)}</span><span class="card-old-price">${formatPrice(p.oldPrice)}</span></div>${p.installment ? `<div class="card-installment"><div><div class="emi-label">From</div><div class="emi-price">${formatPrice(emi)}/mo</div></div></div>` : ""}<div class="card-actions"><a href="product.html?id=${p.id}" class="btn btn-outline" style="font-size:0.8rem;">View</a><button class="btn btn-primary" style="font-size:0.8rem;" onclick="addToCart(${p.id})">Add to Cart</button></div></div></div>`;
    }

    // ===== CART =====
    function getCart() { return JSON.parse(localStorage.getItem("ne_cart") || "[]"); }
    function saveCart(cart) { localStorage.setItem("ne_cart", JSON.stringify(cart)); updateCartCount(); }
    function addToCart(id) {
      const cart = getCart(); const ex = cart.find(i => i.id === id);
      if (ex) ex.qty++; else cart.push({ id, qty: 1 }); saveCart(cart);
    }
    function updateCartCount() {
      const b = document.getElementById("cartCount"); if (!b) return;
      const c = getCart().reduce((s, i) => s + i.qty, 0);
      b.textContent = c; b.style.display = c > 0 ? "flex" : "none";
    }
  </script>
</body>
</html>
